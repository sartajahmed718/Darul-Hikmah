<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dar ul Hikmah — House of Wisdom</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=Cormorant+Garamond&family=Nunito&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background:#0F0A05;
  color:#F2EAD8;
  font-family:'Nunito',sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.container {
  width:420px;
  padding:30px;
  border-radius:16px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(15px);
  border:1px solid rgba(201,169,110,0.2);
}

h2 {
  text-align:center;
  color:#C9A96E;
}

input, select {
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:1px solid rgba(201,169,110,0.2);
  background:rgba(255,255,255,0.05);
  color:#fff;
}

button {
  width:100%;
  padding:12px;
  margin-top:20px;
  border:none;
  border-radius:8px;
  background:linear-gradient(135deg,#C9A96E,#a8894f);
  color:#000;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
<h2>Student Registration</h2>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="address" placeholder="Full Address">

<select id="gender">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<input id="email" placeholder="Email">
<input id="education" placeholder="Education Qualification">
<input id="shaykh" placeholder="Any Shaykh">
<input id="source" placeholder="How did you find us?">

<button onclick="submitForm()">Submit</button>

</div>

<script>
const supabaseClient = window.supabase.createClient(
  "https://zewfsjfbizjbiakkatcuv.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpld2ZzamZqemJpamFra2F0Y3V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzUzNjAsImV4cCI6MjA5MDcxMTM2MH0.xjF8RjWWPCchsFXTTva_tBAj9UAlkYKaVD6OPfufqIs"
);

async function submitForm() {

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const address = document.getElementById("address").value.trim();
  const gender = document.getElementById("gender").value;
  const email = document.getElementById("email").value.trim();
  const education = document.getElementById("education").value.trim();
  const shaykh = document.getElementById("shaykh").value.trim();
  const source = document.getElementById("source").value.trim();

  if (!name || !phone) {
    alert("Name & Phone required");
    return;
  }

  const { error } = await supabaseClient
    .from("submissions")
    .insert([{
      name,
      phone,
      Full_Address: address,
      Gender: gender,
      Email_id: email,
      Education_Qualifi: education,
      any_Shaykh: shaykh,
      source
    }]);

  if (error) {
    console.error(error);
    alert("Failed ❌");
  } else {
    alert("Submitted ✅");

    document.querySelectorAll("input,select").forEach(el => el.value="");
  }
}
</script>

</body>
</html>
