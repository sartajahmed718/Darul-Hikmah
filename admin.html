<meta charset="UTF-8">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const supabaseClient = window.supabase.createClient(
  "https://zewfsjfjzbijakkatcuu.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inpld2ZzamZqemJpamFra2F0Y3V1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxMzUzNjAsImV4cCI6MjA5MDcxMTM2MH0.xjF8RjWWPCchsFXTTva_tBAj9UAlkYKaVD6OPfufqIs"
);

// 🔐 Check login
async function checkAuth() {
  const { data, error } = await supabaseClient.auth.getUser();

  if (error || !data.user) {
    window.location.href = "/login.html";
  }
}

// 🚪 Logout
async function logout() {
  await supabaseClient.auth.signOut();
  window.location.href = "/login.html";
}

// 🔄 Change password
async function changePassword() {
  const newPassword = document.getElementById("newPassword").value;

  if (!newPassword) {
    alert("Enter new password");
    return;
  }

  const { error } = await supabaseClient.auth.updateUser({
    password: newPassword
  });

  if (error) {
    alert(error.message);
  } else {
    alert("Password updated ✅");
    document.getElementById("newPassword").value = "";
  }
}

// 📊 Load data (FIXED)
async function loadData() {
  const { data, error } = await supabaseClient
    .from("students") // ✅ correct table
    .select("*")
    .order("id", { ascending: false });

  if (error) {
    alert(error.message);
    return;
  }

  const table = document.querySelector("#data-table tbody");
  table.innerHTML = "";

  if (!data.length) {
    table.innerHTML = "<tr><td colspan='10'>No data found</td></tr>";
    return;
  }

  data.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.full_name || ""}</td>
      <td>${row.phone || ""}</td>
      <td>${row.address || ""}</td>
      <td>${row.gender || ""}</td>
      <td>${row.email || ""}</td>
      <td>${row.education || ""}</td>
      <td>${row.previous_study || ""}</td>
      <td>${row.reason || ""}</td>
      <td>${row.source || ""}</td>
      <td>${row.payment_status || ""}</td>
      <td><button onclick="deleteRow(${row.id})">Delete</button></td>
    `;

    table.appendChild(tr);
  });
}

// 🗑 Delete
async function deleteRow(id) {
  if (!confirm("Delete this entry?")) return;

  const { error } = await supabaseClient
    .from("students") // ✅ correct table
    .delete()
    .eq("id", id);

  if (error) {
    alert(error.message);
  } else {
    loadData();
  }
}

// 🔄 Refresh
function refreshData() {
  loadData();
}

// 🚀 Init
window.onload = async () => {
  await checkAuth();
  await loadData();
};
</script>
